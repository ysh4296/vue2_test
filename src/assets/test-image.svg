<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">테스트 이미지</title>
  <desc id="desc">Vue2 프론트엔드에서 테스트용으로 사용하는 샘플 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="24" />
  <g fill="#fff" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="320" y="165" font-size="44" font-weight="700">Vue 2 테스트</text>
    <text x="320" y="215" font-size="28">이미지 로딩 성공</text>
  </g>
</svg>
